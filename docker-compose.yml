version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: exchange-rate-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: exchange_rate
      MYSQL_USER: exchange
      MYSQL_PASSWORD: exchange123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
